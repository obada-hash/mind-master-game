<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Nunito', sans-serif; background: #0284a8; min-height: 100vh; overflow-x: hidden; padding-bottom: 100px; }

        /* Warm beach sky gradient */
        .bg-rays {
            position: fixed; inset: 0;
            background: linear-gradient(160deg, #56d4f0 0%, #0ea5c8 40%, #0284a8 100%);
            z-index: 0;
        }
        /* Big soft sun glow top-right */
        .bg-rays::before {
            content: ''; position: absolute; top: -180px; right: -180px;
            width: 600px; height: 600px; border-radius: 50%;
            background: radial-gradient(circle, #fff9c488 0%, #ffd54f44 40%, transparent 70%);
            pointer-events: none;
        }
        /* Ocean shimmer bottom */
        .bg-rays::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 35%;
            background: linear-gradient(to top, rgba(2,90,130,0.55), transparent);
            pointer-events: none;
        }

        .content { position: relative; z-index: 1; padding: 24px; }

        /* ── Header ── */
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
        .game-title { font-family: 'Bangers', cursive; font-size: 56px; letter-spacing: 4px; color: #fff; text-shadow: 4px 4px 0 #ff6b35, 8px 8px 0 #e8302a, -2px -2px 0 #ffe066; line-height: 1; }
        .game-subtitle { font-family: 'Bangers', cursive; font-size: 20px; letter-spacing: 6px; color: #ffe066; margin-top: 4px; }
        .header-right { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

        .cfg-input { background: rgba(255,255,255,0.22); border: 2px solid rgba(255,255,255,0.45); border-radius: 10px; color: #fff; font-family: 'Nunito', sans-serif; font-size: 15px; padding: 8px 14px; outline: none; }
        .cfg-input::placeholder { color: rgba(255,255,255,0.5); }
        .cfg-input:focus { border-color: #ffe066; background: rgba(255,255,255,0.32); }

        .outline-btn { background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.7); color: #fff; font-family: 'Bangers', cursive; font-size: 20px; letter-spacing: 2px; padding: 10px 24px; border-radius: 50px; cursor: pointer; transition: all 0.2s; }
        .outline-btn:hover { background: #fff; color: #0ea5c8; transform: scale(1.05); box-shadow: 0 4px 20px rgba(255,255,255,0.4); }

        /* ── Tabs ── */
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn { font-family: 'Bangers', cursive; font-size: 20px; letter-spacing: 2px; padding: 8px 24px; border-radius: 50px; cursor: pointer; border: 2px solid rgba(255,255,255,0.35); background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); transition: all 0.2s; }
        .tab-btn.active { background: #fff; color: #0284a8; box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
        .tab-btn:hover:not(.active) { color: #fff; border-color: #fff; background: rgba(255,255,255,0.22); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ── Play bar ── */
        .config-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .action-btn { background: #ff6b35; border: none; color: #fff; font-family: 'Bangers', cursive; font-size: 20px; letter-spacing: 2px; padding: 10px 24px; border-radius: 50px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 0 #c0431a; white-space: nowrap; }
        .action-btn:hover { background: #ff8555; transform: translateY(-2px); box-shadow: 0 6px 0 #c0431a; }
        .action-btn.pink { background: #ff3d7f; box-shadow: 0 4px 0 #b5004d; }
        .action-btn.pink:hover { background: #ff6699; box-shadow: 0 6px 0 #b5004d; }
        .timer-label { color: rgba(255,255,255,0.9); font-size: 13px; letter-spacing: 1px; white-space: nowrap; font-weight: 700; }

        /* ── Team Setup Card ── */
        .team-setup { background: rgba(255,255,255,0.18); border: 1.5px solid rgba(255,255,255,0.4); border-radius: 20px; padding: 18px 24px; margin-bottom: 20px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; backdrop-filter: blur(8px); }
        .team-setup-title { font-family: 'Bangers', cursive; font-size: 18px; letter-spacing: 2px; color: #fff; white-space: nowrap; }
        .team-field { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 180px; }
        .team-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
        .team-dot.t1 { background: #ff6b35; }
        .team-dot.t2 { background: #00ddc3; }
        .team-field input { background: rgba(255,255,255,0.25); border: 1.5px solid rgba(255,255,255,0.5); border-radius: 10px; color: #fff; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; padding: 8px 14px; outline: none; flex: 1; }
        .team-field input::placeholder { color: rgba(255,255,255,0.5); font-weight: 400; }
        .team-field input:focus { border-color: #ffe066; background: rgba(255,255,255,0.32); }

        /* ── Board: glass column cards ── */
        .board { display: grid; gap: 16px; }

        /* Each column gets a frosted glass card */
        .board > div {
            background: rgba(255,255,255,0.14);
            border: 1.5px solid rgba(255,255,255,0.35);
            border-radius: 24px;
            padding: 14px 12px 6px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(2,90,130,0.18), inset 0 1px 0 rgba(255,255,255,0.3);
        }

        /* Category header: solid white pill, color text — stands out clearly */
        .category-header {
            font-family: 'Nunito', sans-serif; font-weight: 900;
            font-size: 22px; text-align: center;
            padding: 14px 16px; border-radius: 14px;
            margin-bottom: 12px; text-transform: uppercase;
            letter-spacing: 2px; color: #fff;
            text-shadow: 0 1px 4px rgba(0,0,0,0.25);
        }

        /* Question tile: solid bright colored */
        .question-tile {
            border-radius: 14px; padding: 18px 10px; text-align: center;
            cursor: pointer; font-family: 'Bangers', cursive; font-size: 26px;
            letter-spacing: 3px; line-height: 1;
            transition: transform 0.15s, box-shadow 0.15s;
            border: none; position: relative; overflow: hidden; user-select: none;
            margin-bottom: 8px;
        }
        .question-tile:hover:not(.answered) { transform: translateY(-5px) scale(1.02); }
        .question-tile:active:not(.answered) { transform: translateY(2px) scale(0.98); }
        .question-tile.answered { cursor: not-allowed; opacity: 0.3; filter: grayscale(0.8); }
        .question-tile.answered::after { content: ''; position: absolute; inset: 0; border-radius: 14px; }

        .cat-0 .category-header { background: linear-gradient(135deg, #0097a7, #005f6b); }
        .cat-0 .question-tile { background: #00bcd4; color: #002f36; box-shadow: 0 6px 0 #00838f; }
        .cat-0 .question-tile:hover:not(.answered) { box-shadow: 0 10px 0 #00838f, 0 12px 24px rgba(0,188,212,0.4); }

        .cat-1 .category-header { background: linear-gradient(135deg, #1565c0, #0d47a1); }
        .cat-1 .question-tile { background: #1e88e5; color: #00142e; box-shadow: 0 6px 0 #1565c0; }
        .cat-1 .question-tile:hover:not(.answered) { box-shadow: 0 10px 0 #1565c0, 0 12px 24px rgba(30,136,229,0.4); }

        .cat-2 .category-header { background: linear-gradient(135deg, #00897b, #004d40); }
        .cat-2 .question-tile { background: #26a69a; color: #002b26; box-shadow: 0 6px 0 #00695c; }
        .cat-2 .question-tile:hover:not(.answered) { box-shadow: 0 10px 0 #00695c, 0 12px 24px rgba(38,166,154,0.4); }

        .cat-3 .category-header { background: linear-gradient(135deg, #f4511e, #b71c1c); }
        .cat-3 .question-tile { background: #ef5350; color: #1a0000; box-shadow: 0 6px 0 #b71c1c; }
        .cat-3 .question-tile:hover:not(.answered) { box-shadow: 0 10px 0 #b71c1c, 0 12px 24px rgba(239,83,80,0.4); }

        .cat-4 .category-header { background: linear-gradient(135deg, #0288d1, #01579b); }
        .cat-4 .question-tile { background: #29b6f6; color: #002040; box-shadow: 0 6px 0 #0277bd; }
        .cat-4 .question-tile:hover:not(.answered) { box-shadow: 0 10px 0 #0277bd, 0 12px 24px rgba(41,182,246,0.4); }

        /* ── Score Bar (fixed bottom) ── */
        .score-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
            background: rgba(255,255,255,0.97); backdrop-filter: blur(10px);
            border-top: 3px solid rgba(0,61,82,0.1);
            display: flex; align-items: stretch; height: 90px;
            box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.34,1.3,0.64,1);
        }
        .score-bar.visible { transform: translateY(0); }
        .score-team {
            flex: 1; display: flex; flex-direction: row; align-items: center; justify-content: center;
            gap: 14px; padding: 0 28px; transition: background 0.15s;
            border-right: 2px solid rgba(0,61,82,0.07); min-width: 0;
        }
        .score-team:last-child { border-right: none; }
        .score-team:hover { background: rgba(0,61,82,0.03); }
        .score-team-name { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 28px; letter-spacing: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1; }
        .score-team-pts { font-family: 'Bangers', cursive; font-size: 48px; letter-spacing: 2px; line-height: 1; flex-shrink: 0; }
        .score-team.t1 .score-team-name { color: #c0431a; }
        .score-team.t1 .score-team-pts { color: #ff6b35; }
        .score-team.t2 .score-team-name { color: #008a78; }
        .score-team.t2 .score-team-pts { color: #00c9b1; }
        .score-divider {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 0 16px; gap: 2px; flex-shrink: 0;
        }
        .vs-line { width: 2px; height: 10px; background: linear-gradient(to bottom, #ff6b35, #00c9b1); border-radius: 2px; }
        .vs-text { font-family: 'Bangers', cursive; font-size: 22px; letter-spacing: 4px; background: linear-gradient(135deg, #ff6b35, #ffd000, #00c9b1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; }

        /* ── Modal ── */
        .modal-overlay { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,50,70,0.75); align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-overlay.open { display: flex; }
        .modal {
            position: relative; background: #ffffff; border-radius: 28px;
            padding: 44px 48px; max-width: 820px; width: 94%;
            border: 4px solid #ff6b35;
            box-shadow: 0 24px 80px rgba(0,0,0,0.28), 0 0 0 10px rgba(255,107,53,0.12);
            animation: popIn 0.28s cubic-bezier(0.34,1.56,0.64,1); text-align: center;
        }
        @keyframes popIn { from { transform: scale(0.65); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .modal-score-badge { font-family: 'Bangers', cursive; font-size: 22px; letter-spacing: 3px; padding: 8px 24px; border-radius: 50px; display: inline-block; margin-bottom: 24px; }
        .modal-question { font-family: 'Nunito', sans-serif; font-size: 32px; font-weight: 900; color: #003d52; line-height: 1.45; margin-bottom: 24px; }

        .answer-box { background: #e8fff9; border: 2px solid #00c9b1; border-radius: 14px; padding: 16px 24px; margin-bottom: 24px; display: none; }
        .answer-box.visible { display: block; animation: popIn 0.2s ease; }
        .answer-label { font-family: 'Bangers', cursive; font-size: 13px; letter-spacing: 3px; color: #008a78; margin-bottom: 6px; }
        .answer-text { font-family: 'Nunito', sans-serif; font-size: 26px; font-weight: 900; color: #003d36; }

        .timer-ring { display: flex; align-items: center; justify-content: center; margin-bottom: 24px; }
        .timer-circle { position: relative; width: 100px; height: 100px; }
        .timer-circle svg { transform: rotate(-90deg); }
        .timer-track { fill: none; stroke: #e0f7fa; stroke-width: 7; }
        .timer-bar { fill: none; stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.5s; }
        .timer-number { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Bangers', cursive; font-size: 36px; color: #003d52; letter-spacing: 1px; }
        .timer-ok .timer-bar { stroke: #00c9b1; }
        .timer-warning .timer-bar { stroke: #ffd000; }
        .timer-expired .timer-bar { stroke: #ff3d7f; }

        /* Top action buttons row */
        .modal-btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-bottom: 24px; }
        .modal-btn { border: none; font-family: 'Bangers', cursive; font-size: 22px; letter-spacing: 2px; padding: 13px 36px; border-radius: 50px; cursor: pointer; transition: all 0.2s; }
        .modal-btn.reveal { background: #00c9b1; color: #003d36; box-shadow: 0 5px 0 #008a78; }
        .modal-btn.reveal:hover { transform: translateY(-3px); box-shadow: 0 8px 0 #008a78, 0 0 20px #00c9b155; }
        .modal-btn.reveal:active { transform: translateY(1px); box-shadow: 0 2px 0 #008a78; }

        /* Point award section */
        .award-section { border-top: 2px dashed rgba(0,61,82,0.12); padding-top: 20px; }
        .award-label { font-family: 'Bangers', cursive; font-size: 16px; letter-spacing: 3px; color: rgba(0,61,82,0.45); margin-bottom: 14px; }
        .award-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .award-btn {
            border: none; font-family: 'Bangers', cursive; font-size: 20px; letter-spacing: 2px;
            padding: 14px 28px; border-radius: 16px; cursor: pointer; transition: all 0.2s;
            display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 160px;
        }
        .award-btn .btn-team-name { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 18px; letter-spacing: 1px; opacity: 0.95; }
        .award-btn .btn-pts { font-size: 26px; }
        .award-btn.t1 { background: #ff6b35; color: #fff; box-shadow: 0 5px 0 #c0431a; }
        .award-btn.t1:hover { transform: translateY(-3px); box-shadow: 0 8px 0 #c0431a, 0 0 20px #ff6b3555; }
        .award-btn.t1:active { transform: translateY(1px); box-shadow: 0 2px 0 #c0431a; }
        .award-btn.t2 { background: #00c9b1; color: #003d36; box-shadow: 0 5px 0 #008a78; }
        .award-btn.t2:hover { transform: translateY(-3px); box-shadow: 0 8px 0 #008a78, 0 0 20px #00c9b155; }
        .award-btn.t2:active { transform: translateY(1px); box-shadow: 0 2px 0 #008a78; }
        .award-btn.nopts { background: rgba(0,61,82,0.08); color: rgba(0,61,82,0.5); box-shadow: 0 5px 0 rgba(0,61,82,0.1); }
        .award-btn.nopts:hover { background: rgba(0,61,82,0.14); transform: translateY(-2px); }

        /* ── Create panel ── */
        .create-panel { max-width: 900px; }
        .panel-section { background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.45); border-radius: 16px; padding: 20px 24px; margin-bottom: 16px; backdrop-filter: blur(4px); }
        .panel-label { font-family: 'Bangers', cursive; font-size: 18px; letter-spacing: 2px; color: #003d52; margin-bottom: 14px; }
        .full-input { background: rgba(255,255,255,0.35); border: 2px solid rgba(255,255,255,0.6); border-radius: 8px; color: #003d52; font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 700; padding: 9px 14px; outline: none; width: 100%; }
        .full-input:focus { border-color: #ff6b35; background: rgba(255,255,255,0.55); }
        .full-input::placeholder { color: rgba(0,61,82,0.4); font-weight: 400; }
        .categories-list { display: flex; flex-direction: column; gap: 14px; }
        .category-block { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 12px; padding: 14px 16px; }
        .cat-block-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .cat-block-header span { font-family: 'Bangers', cursive; font-size: 16px; letter-spacing: 2px; color: #fff; white-space: nowrap; text-shadow: 1px 1px 0 rgba(0,0,0,0.2); }
        .remove-btn { background: transparent; border: 1px solid #ff3d7f; color: #ff3d7f; border-radius: 6px; font-size: 12px; padding: 4px 10px; cursor: pointer; font-family: 'Nunito', sans-serif; font-weight: 700; white-space: nowrap; }
        .remove-btn:hover { background: #ff3d7f; color: #fff; }
        .questions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .q-row { display: flex; gap: 6px; align-items: center; }
        .score-badge { font-family: 'Bangers', cursive; font-size: 13px; letter-spacing: 1px; background: rgba(255,255,255,0.3); color: #003d52; padding: 4px 8px; border-radius: 6px; min-width: 48px; text-align: center; font-weight: 700; }
        .q-input { background: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.5); border-radius: 6px; color: #003d52; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; padding: 7px 10px; outline: none; flex: 1; min-width: 0; }
        .q-input:focus { border-color: #ff6b35; background: rgba(255,255,255,0.5); }
        .q-input::placeholder { color: rgba(0,61,82,0.35); font-weight: 400; }
        .add-cat-btn { background: rgba(255,255,255,0.15); border: 2px dashed rgba(255,255,255,0.6); color: #fff; font-family: 'Bangers', cursive; font-size: 18px; letter-spacing: 2px; padding: 10px; border-radius: 12px; cursor: pointer; width: 100%; transition: all 0.2s; margin-top: 12px; }
        .add-cat-btn:hover { border-color: #fff; background: rgba(255,255,255,0.28); }
        .submit-row { display: flex; gap: 12px; justify-content: flex-end; align-items: center; margin-top: 8px; }
        .success-toast { background: #ffd000; color: #3d2800; font-family: 'Bangers', cursive; font-size: 16px; letter-spacing: 2px; padding: 10px 20px; border-radius: 10px; display: none; }

        .state-msg { font-family: 'Bangers', cursive; font-size: 32px; letter-spacing: 4px; color: #fff; text-align: center; padding: 80px 20px; text-shadow: 2px 2px 0 rgba(0,0,0,0.15); }

        /* Score bump animation */
        @keyframes scoreBump { 0%{transform:scale(1)} 40%{transform:scale(1.35)} 100%{transform:scale(1)} }
        .score-bump { animation: scoreBump 0.4s cubic-bezier(0.34,1.56,0.64,1); }
    </style>
</head>
<body>

<audio id="bgMusic" loop src="game-music.mp3"></audio>

<div class="bg-rays"></div>
<div class="content">

    <div class="header">
        <div>
            <div class="game-title">MIND MASTER</div>
            <div class="game-subtitle">TRIVIA CHALLENGE</div>
        </div>
        <div class="header-right">
            <button class="outline-btn" id="musicToggleBtn" onclick="toggleMusic()">🔊 Music</button>
            <input class="cfg-input" type="text" id="apiBase" placeholder="API URL" value="https://mind-master-game-azz.onrender.com" style="width:220px;" />
            <button class="outline-btn" onclick="resetGame()">↺ Reset</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tab-btn-play" onclick="switchTab('play', this)">▶ Play Game</button>
        <button class="tab-btn" id="tab-btn-create" onclick="switchTab('create', this)">＋ Create Game</button>
    </div>

    <div class="tab-panel active" id="tab-play">

        <div class="team-setup" id="teamSetup">
            <span class="team-setup-title">🏖 TEAMS</span>
            <div class="team-field">
                <div class="team-dot t1"></div>
                <input type="text" id="team1Name" placeholder="Team 1 name" value="Team Sunset" />
            </div>
            <div class="team-field">
                <div class="team-dot t2"></div>
                <input type="text" id="team2Name" placeholder="Team 2 name" value="Team Ocean" />
            </div>
        </div>

        <div class="config-bar">
            <input class="cfg-input" type="number" id="gameIdInput" placeholder="Game ID" value="1" min="1" style="width:100px;" />
            <button class="action-btn" onclick="loadGame()">▶ Load Game</button>
            <span class="timer-label">Timer (sec):</span>
            <input class="cfg-input" type="number" id="timerSeconds" value="30" min="5" max="300" style="width:80px;" />
        </div>

        <div id="boardArea"><div class="state-msg">Enter a Game ID and click Load Game</div></div>
    </div>

    <div class="tab-panel" id="tab-create">
        <div class="create-panel">
            <div class="panel-section">
                <div class="panel-label">Game Info</div>
                <input class="full-input" type="text" id="newGameName" placeholder="Game name (e.g. Science Quiz Night)" />
            </div>
            <div class="panel-section">
                <div class="panel-label">Categories & Questions</div>
                <div class="categories-list" id="categoriesList"></div>
                <button class="add-cat-btn" onclick="addCategory()">＋ Add Category</button>
            </div>
            <div class="submit-row">
                <div class="success-toast" id="successToast"></div>
                <button class="action-btn pink" onclick="submitGame()">🚀 Create Game</button>
            </div>
        </div>
    </div>

</div>

<div class="score-bar" id="scoreBar">
    <div class="score-team t1" id="scoreTeam1">
        <div class="score-team-name" id="scoreT1Name">Team Sunset</div>
        <div class="score-team-pts" id="scoreT1Pts">0</div>
    </div>
    <div class="score-divider">
        <div class="vs-line"></div>
        <div class="vs-text">VS</div>
        <div class="vs-line"></div>
    </div>
    <div class="score-team t2" id="scoreTeam2">
        <div class="score-team-name" id="scoreT2Name">Team Ocean</div>
        <div class="score-team-pts" id="scoreT2Pts">0</div>
    </div>
</div>

<div class="modal-overlay" id="questionModal">
    <div class="modal">
        <div id="modalBadge" class="modal-score-badge"></div>
        <div id="modalQuestion" class="modal-question"></div>

        <div class="answer-box" id="answerBox">
            <div class="answer-label">ANSWER</div>
            <div class="answer-text" id="answerText"></div>
        </div>

        <div class="timer-ring">
            <div class="timer-circle">
                <svg viewBox="0 0 100 100" width="100" height="100">
                    <circle class="timer-track" cx="50" cy="50" r="42"/>
                    <circle class="timer-bar timer-ok" id="timerBar" cx="50" cy="50" r="42"
                            stroke-dasharray="263.9" stroke-dashoffset="0"/>
                </svg>
                <div class="timer-number" id="timerNum">30</div>
            </div>
        </div>

        <div class="modal-btns">
            <button class="modal-btn reveal" onclick="revealAnswer()">👁 Show Answer</button>
        </div>

        <div class="award-section">
            <div class="award-label">WHO GETS THE POINTS?</div>
            <div class="award-btns" id="awardBtns">
                <button class="award-btn t1" onclick="awardPoints(1)">
                    <span class="btn-team-name" id="awardT1Name">TEAM SUNSET</span>
                    <span class="btn-pts" id="awardPts1">+5</span>
                </button>
                <button class="award-btn t2" onclick="awardPoints(2)">
                    <span class="btn-team-name" id="awardT2Name">TEAM OCEAN</span>
                    <span class="btn-pts" id="awardPts2">+5</span>
                </button>
                <button class="award-btn nopts" onclick="awardPoints(0)">
                    <span class="btn-team-name">NO POINTS</span>
                    <span class="btn-pts">✕</span>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // ── Music Setup ────────────────────────────────────────────
    const bgMusic = document.getElementById("bgMusic");
    const musicToggleBtn = document.getElementById("musicToggleBtn");
    let hasInteracted = false;

    // Start music on first click anywhere
    document.addEventListener('click', function(event) {
        // Only trigger if it's the first click and not clicking the music button itself
        if (!hasInteracted && event.target.id !== "musicToggleBtn") {
            bgMusic.play().catch(e => console.log("Audio play prevented:", e));
            hasInteracted = true;
        }
    }, { once: true });

    // Function to toggle music on/off
    function toggleMusic() {
        if (bgMusic.paused) {
            bgMusic.play();
            musicToggleBtn.textContent = "🔊 Music";
        } else {
            bgMusic.pause();
            musicToggleBtn.textContent = "🔇 Muted";
        }
        hasInteracted = true;
    }
    // ───────────────────────────────────────────────────────────

    const API = () => document.getElementById('apiBase').value.replace(/\/$/, '');
    const CIRCUMFERENCE = 2 * Math.PI * 42;
    let currentGame = null;
    let timerInterval = null;
    let currentQuestionId = null;
    let currentAnswer = null;
    let currentScore = 0;
    const scores = [0, 0]; // index 0 = team1, index 1 = team2

    function switchTab(name, btn) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + name).classList.add('active');
        btn.classList.add('active');
    }

    // ── Score Bar ──────────────────────────────────────────────
    function updateScoreBar() {
        const t1 = document.getElementById('team1Name').value || 'Team 1';
        const t2 = document.getElementById('team2Name').value || 'Team 2';
        document.getElementById('scoreT1Name').textContent = t1.toUpperCase();
        document.getElementById('scoreT2Name').textContent = t2.toUpperCase();
        document.getElementById('scoreT1Pts').textContent = scores[0];
        document.getElementById('scoreT2Pts').textContent = scores[1];
        document.getElementById('awardT1Name').textContent = t1.toUpperCase();
        document.getElementById('awardT2Name').textContent = t2.toUpperCase();
    }

    function awardPoints(team) {
        if (team === 1 || team === 2) {
            scores[team - 1] += currentScore;
            updateScoreBar();
            const ptsEl = document.getElementById(`scoreT${team}Pts`);
            ptsEl.classList.remove('score-bump');
            void ptsEl.offsetWidth;
            ptsEl.classList.add('score-bump');
        }
        closeModal();
    }

    // ── Game Loading ───────────────────────────────────────────
    async function loadGame() {
        const id = document.getElementById('gameIdInput').value;
        if (!id) return;
        document.getElementById('boardArea').innerHTML = '<div class="state-msg">Loading...</div>';
        try {
            const res = await fetch(`${API()}/api/v1/game/${id}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            currentGame = await res.json();
            updateScoreBar();
            document.getElementById('scoreBar').classList.add('visible');
            document.getElementById('teamSetup').style.display = 'none';
            renderBoard();
        } catch (e) {
            document.getElementById('boardArea').innerHTML = `<div class="state-msg">Error: ${e.message}</div>`;
        }
    }

    function renderBoard() {
        if (!currentGame) return;
        const cats = currentGame.categories || [];
        const boardEl = document.getElementById('boardArea');
        boardEl.innerHTML = '';
        const grid = document.createElement('div');
        grid.className = 'board';
        grid.style.gridTemplateColumns = `repeat(${cats.length}, 1fr)`;

        cats.forEach((cat, ci) => {
            const col = document.createElement('div');
            col.className = `cat-${ci % 5}`;
            const header = document.createElement('div');
            header.className = 'category-header';
            header.textContent = cat.name;
            col.appendChild(header);

            (cat.questions || []).forEach(q => {
                const tile = document.createElement('div');
                tile.className = 'question-tile' + (q.answered ? ' answered' : '');
                tile.textContent = `${q.score} PTS`;
                tile.dataset.id = q.id;
                if (!q.answered) tile.onclick = () => openQuestion(q.id, q.score, ci);
                col.appendChild(tile);
            });

            grid.appendChild(col);
        });
        boardEl.appendChild(grid);
    }

    // ── Question Modal ─────────────────────────────────────────
    async function openQuestion(qId, score, ci) {
        try {
            const res = await fetch(`${API()}/api/v1/question/${qId}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const q = await res.json();
            currentQuestionId = qId;
            currentAnswer = q.answer;
            currentScore = score;

            const colors    = ['#00c9b1','#ff6bab','#ffd000','#ff6b35','#5dde5d'];
            const textColors= ['#003d36','#4a0020','#3d2800','#3d1100','#0d2b0d'];

            document.getElementById('modalBadge').textContent = `${score} POINTS`;
            document.getElementById('modalBadge').style.background = colors[ci % 5];
            document.getElementById('modalBadge').style.color = textColors[ci % 5];
            document.getElementById('modalQuestion').textContent = q.description;
            document.getElementById('answerBox').classList.remove('visible');
            document.getElementById('answerText').textContent = '';

            // Update award button point labels
            document.getElementById('awardPts1').textContent = `+${score}`;
            document.getElementById('awardPts2').textContent = `+${score}`;

            // Sync team names in modal
            const t1 = document.getElementById('team1Name').value || 'Team 1';
            const t2 = document.getElementById('team2Name').value || 'Team 2';
            document.getElementById('awardT1Name').textContent = t1.toUpperCase();
            document.getElementById('awardT2Name').textContent = t2.toUpperCase();

            document.getElementById('questionModal').classList.add('open');
            startTimer();
        } catch (e) {
            alert('Could not load question: ' + e.message);
        }
    }

    function revealAnswer() {
        document.getElementById('answerText').textContent = currentAnswer || '—';
        document.getElementById('answerBox').classList.add('visible');
    }

    function startTimer() {
        clearInterval(timerInterval);
        const total = parseInt(document.getElementById('timerSeconds').value) || 30;
        let remaining = total;
        const bar = document.getElementById('timerBar');
        const num = document.getElementById('timerNum');
        function update() {
            num.textContent = remaining;
            bar.style.strokeDashoffset = CIRCUMFERENCE * (1 - remaining / total);
            if (remaining <= total * 0.25) bar.className = 'timer-bar timer-expired';
            else if (remaining <= total * 0.5) bar.className = 'timer-bar timer-warning';
            else bar.className = 'timer-bar timer-ok';
        }
        update();
        timerInterval = setInterval(() => { remaining--; update(); if (remaining <= 0) clearInterval(timerInterval); }, 1000);
    }

    async function closeModal() {
        clearInterval(timerInterval);
        document.getElementById('questionModal').classList.remove('open');
        if (currentQuestionId !== null) {
            try { await fetch(`${API()}/api/v1/question/${currentQuestionId}/answered`, { method: 'PUT' }); }
            catch (e) { console.warn('Mark answered failed:', e); }
            const tile = document.querySelector(`.question-tile[data-id="${currentQuestionId}"]`);
            if (tile) { tile.classList.add('answered'); tile.onclick = null; }
            currentQuestionId = null;
            currentAnswer = null;
            currentScore = 0;
        }
    }

    async function resetGame() {
        if (!currentGame) return;
        if (!confirm('Reset all questions and scores?')) return;
        scores[0] = 0; scores[1] = 0;
        updateScoreBar();
        document.getElementById('teamSetup').style.display = '';
        document.getElementById('scoreBar').classList.remove('visible');
        try {
            await fetch(`${API()}/api/v1/game/${currentGame.id}/reset`, { method: 'PUT' });
            await loadGame();
        } catch (e) { alert('Reset failed: ' + e.message); }
    }

    // ── Create Game ────────────────────────────────────────────
    const SCORES = [5, 10, 20, 40];
    let catCount = 0;

    function addCategory() {
        catCount++;
        const id = `cat-${catCount}`;
        const div = document.createElement('div');
        div.className = 'category-block';
        div.id = id;
        div.innerHTML = `
    <div class="cat-block-header">
      <span>CAT ${catCount}</span>
      <input class="full-input" type="text" placeholder="Category name (e.g. علوم)" id="${id}-name" style="flex:1;"/>
      <button class="remove-btn" onclick="document.getElementById('${id}').remove()">✕ Remove</button>
    </div>
    <div class="questions-grid">
      ${SCORES.map(s => `
        <div class="q-row">
          <span class="score-badge">${s} PTS</span>
          <input class="q-input" type="text" placeholder="Question..." id="${id}-q-${s}-desc"/>
          <input class="q-input" type="text" placeholder="Answer..." id="${id}-q-${s}-ans" style="max-width:110px;"/>
        </div>`).join('')}
    </div>`;
        document.getElementById('categoriesList').appendChild(div);
    }

    async function submitGame() {
        const name = document.getElementById('newGameName').value.trim();
        if (!name) { alert('Please enter a game name.'); return; }
        const catBlocks = document.querySelectorAll('.category-block');
        if (!catBlocks.length) { alert('Add at least one category.'); return; }

        const categories = [];
        for (const block of catBlocks) {
            const catName = block.querySelector('[id$="-name"]').value.trim();
            if (!catName) { alert('Every category needs a name.'); return; }
            const questions = [];
            for (const s of SCORES) {
                const desc = block.querySelector(`[id$="-q-${s}-desc"]`).value.trim();
                const ans  = block.querySelector(`[id$="-q-${s}-ans"]`).value.trim();
                if (!desc || !ans) { alert(`Fill in all questions and answers for "${catName}" (${s} pts).`); return; }
                questions.push({ description: desc, answer: ans, score: s });
            }
            categories.push({ name: catName, questions });
        }

        try {
            const res = await fetch(`${API()}/api/v1/game`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, categories })
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const created = await res.json();
            const toast = document.getElementById('successToast');
            toast.textContent = `✓ "${created.name}" created! ID: ${created.id}`;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 5000);
            document.getElementById('newGameName').value = '';
            document.getElementById('categoriesList').innerHTML = '';
            catCount = 0;
            document.getElementById('gameIdInput').value = created.id;
        } catch (e) { alert('Create failed: ' + e.message); }
    }

    // Keep score bar team names in sync as user types
    document.getElementById('team1Name').addEventListener('input', updateScoreBar);
    document.getElementById('team2Name').addEventListener('input', updateScoreBar);

    addCategory(); addCategory(); addCategory();
</script>
</body>
</html>
